name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Install PDK
        run: gem install pdk
      - name: Build module tarball
        run: pdk build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pkg/*.tar.gz
