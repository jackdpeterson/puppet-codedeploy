name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Install PDK
        run: gem install pdk
      - name: Build module tarball
        run: pdk build
      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: module-tarball
          path: pkg/*.tar.gz
